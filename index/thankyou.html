    <script>
      const canvas = document.getElementById("canvas");
      const c = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();

      const mouse = { x: undefined, y: undefined };

      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      window.addEventListener("resize", () => {
        resizeCanvas();
      });

      function getRandomInt(max) {
        return Math.floor(Math.random() * max);
      }

      function Circle() {
        this.radius = getRandomInt(10);
        this.originalSize = this.radius;
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this.color = `rgba(${getRandomInt(255)},${getRandomInt(
          255
        )},${getRandomInt(255)},0.5)`;
        this.dx = (Math.random() - 0.5) * 4;
        this.dy = (Math.random() - 0.5) * 4;

        this.draw = () => {
          c.beginPath();
          c.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          c.fillStyle = this.color;
          c.fill();
        };

        this.update = () => {
          const w = window.innerWidth;
          const h = window.innerHeight;

          if (this.x + this.radius > w || this.x - this.radius < 0) {
            this.dx = -this.dx;
          }
          if (this.y + this.radius > h || this.y - this.radius < 0) {
            this.dy = -this.dy;
          }

          this.x += this.dx;
          this.y += this.dy;

          if (
            mouse.x != null &&
            mouse.y != null &&
            mouse.x - this.x < 50 &&
            mouse.x - this.x > -50 &&
            mouse.y - this.y < 50 &&
            mouse.y - this.y > -50
          ) {
            if (this.radius < 80) this.radius += 2;
          } else if (this.radius > this.originalSize) {
            this.radius -= 2;
          }

          this.draw();
        };
      }

      const circles = [];
      for (let i = 0; i < 30; i++) circles.push(new Circle());

      function animate() {
        c.clearRect(0, 0, window.innerWidth, window.innerHeight);
        circles.forEach((circle) => circle.update());
        requestAnimationFrame(animate);
      }

      animate();
    </script>

ZFAdvLead.prototype.zfautm_gP = function(s, q) {
  try{
      var match = s.match('[?&]' + q + '=([^&]+)');
      if ( match ) {
        if ( match[1].length > 199 ) {
          var raw = decodeURIComponent(match[1]);
          raw = raw.replace(/[^A-Za-z0-9_]/g, '');
          return raw.slice( 0, 199 );
        } else {
          return decodeURIComponent(match[1]);
        }
        
      } else {
        return '';
      }
  } catch(e){
    return '';  
  }
}
